<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">


    <style>
        /*
            모든 요소를 border-box
            -> width, hegiht에 padding/border까지 포함해서 계산
        */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #f5f5f5;
            font-family: "Noto Sans KR", sans-serif;
            font-weight: 500;
            /*글씨 굵기*/
            padding-top: 60px;
            height: 3000px;
        }
        /* 박스모델 : content/padding/border/margin */
        /* 기본적으로 내부크기에 반영되는 사이즈에는 content/padding/border 전부 포함*/
        
        .box {
            width: 200px;
            height: 80px;
            padding: 20px;
            margin: 10px;
            border: 2px solid #3c69fd;
            background: #9eb5ff;
        }
        /* dispaly : 배치 성경 변경하기 */
        /*inline요소는 크기가 컨텐츠에 딱맞게 설정되며, 기본적으로 사이즈 조절x*/
        /* diplay속성을 inline-block으로 바꾸면 옆으로 정렬 + 크기 조절 가능 */
        
        .inline-box {
            display: inline-block;
            width: 120px;
            height: 60px;
            text-align: center;
            line-height: 60px;
            background: #fffebe;
        }
        /* display: none을 설정하면 화면에 안보임 */
        
        .hidden {
            display: none;
        }
        /* position : 위치 지정하기 */
        /* 상단 고정 헤더 : 스크롤을 해도 맨 위에 고정 */
        
        .header {
            width: 100%;
            height: 50px;
            background: #333;
            /*배경색*/
            color: white;
            /*글씨색*/
            text-align: center;
            line-height: 50px;
            position: fixed;
            /*위치기준을 화면(viewport)으로 고정*/
            top: 0;
            left: 0;
        }
        /* 카드 */
        
        .card {
            position: relative;
            /*자식 absolute의 기준*/
            width: 300px;
            padding: 20px;
            border: 1px solid black;
            margin: 20px auto;
            /*좌우 여백을 동일하게하여 중앙정렬*/
            background: white;
        }
        /*new 뱃지 : 카드 오른쪽 모서리에 배치*/
        
        .badge {
            position: absolute;
            top: 10px;
            right: 14px;
        }
        
        .phone {
            position: relative;
            top: -10px;
            left: 0px;
        }
    </style>
</head>

<body>
    <div class="header">스크롤을 해도 고정되는 헤더</div>

    <h2>박스모델</h2>
    <!-- padding/border/margin이 어떻게 치수적용이 될까? -->
    <div class="box">
        (content + padding + border) + margin
    </div>

    <h2>display : iline-block</h2>
    <!-- 크기를 가진 영역이 나란히 배치가 되어있음 -->
    <span class="inline-box">박스 A</span>
    <span class="inline-box">박스 B</span>
    <span class="inline-box">박스 C</span>

    <br>

    <p class="hidden">이 문장은 display:none이다</p>

    <br>
    <br>

    <h2>position : relative + absolute</h2><br>
    <div class="card">
        <span class="badge">New</span>
        <h2>프로필 카드</h2>
        <p>relative부모 안에서 absolute자식이 오른쪽 위에 배치된다.</p>
        <span class="phone">ph : 010 - xxxx - xxxx</span>
    </div>
</body>

</html>
