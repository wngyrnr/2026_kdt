<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">

    <!-- 내부 css 적용방법 : style태그를 통해서 적용-->
    <style>
        /* 전체 선택자(*) */
        
        * {
            margin: 0;
            padding: 0;
        }
        /* 테그 선택자 */
        
        body {
            background: #aba0f8;
            font-family: "Noto Sans KR", sans-serif;
            font-weight: 500;
            /*글씨 굵기*/
        }
        /* h1태그는 전부 */
        
        h1 {
            color: blue;
            /*글씨색*/
            font-family: "맑은 고딕", sans-serif;
            padding: 20px;
            /*테두리 내부의 여백*/
        }
        
        p {
            color: #333;
            font-size: 16px;
            line-height: 20px;
            /*글씨의 높이*/
        }
        /*  id 선택자 : #아이디명 */
        
        #main-description {
            background: yellow;
            text-decoration: underline;
        }
        /* class 선택자 : .클래스명 */
        
        .highlight {
            font-weight: 900;
            color: red;
        }
        /*
        기본적으로 margin, padding은 4면에 적용
        padding/margin : 4면사이즈
        padding/margin : 위/아래 오른/왼
        padding/margin : 위 오른쪽 아래 왼쪽

        */
        
        div {
            padding: 24px;
            padding: 24px 6px;
            padding: 24px 12px 50px 30px;
            margin: 24px;
            border: 1px solid white;
            /* 굵기 모양 색상*/
        }
        /* 관계 선택자*/
        /* 자식선택자 : 특정 선택자 바로 아래있는 선택자
           자손선택자 : 특정 선택자 안에있는 모든 선택자
        */
        /* 자손선택자는 띄어쓰기로 구분해서 .box클래스 안에있는 모든 p태그 */
        
        .box p {
            color: white;
        }
        /* 자식선택자는 > 구분해서 .box클래스 바로 아래있는 p태그*/
        
        .box>p {
            color: red;
        }
    </style>
</head>

<body>
    <!-- CSS 인라인 적용방법 : style속성을 통해서 적용-->
    <h1 style="color: aqua;">CSS 기초</h1>

    <h2>선택자 연습</h2>

    <p>
        이 문장은 p스타일이 적용된다. 그리고 이 단언는 <span class="highlight">강조</span>된다.
    </p>

    <p id="main-description">
        이 문장은 id='main-description'인 스타일이 적용됨
    </p>

    <br><br><br>
    <hr>
    <br><br><br>
    <h3>관계선택자</h3>
    <div>
        <p>.box안의 p -> 보라색</p>
        <span>.box의 안의 span -> 주황색</span>
    </div>
    <div class="box">
        <p>.box안의 p -> 보라색</p>
        <span>
            .box의 안의 span -> 주황색
            <p>.box안의 p -> 보라색</p>
        </span>
    </div>
</body>

</html>
