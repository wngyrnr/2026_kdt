    <h1>웹 스토리지</h1>
    <p>
        브라우저에 데이터를 key-value로 저장하는 공간<br> -localStorage : 영구저장(브라우저를 받아도 유지) -sessionStorage : 탭 단위 저장(탭을 닫으면 사라짐) 메서드 : setItem (key,value),getItem(key), removeItem(key), clear() 웹스토리지는 '문자열'만 저장이 가능
    </p>

    <h3>-localStorage 저장/조회/삭제</h3>
    값 : <input type="text" id="memo-input" placeholder="저장할 값">
    <button onclick="saveMemo()">저장</button>
    <button onclick="loadMemo">조회</button>
    <button onclick="removememo">삭제</button>
    <div id="area1" class="area"></div>
    <script>
        function saveMemo() {
            const memo = document.querySelector("#memo-input").value;
            localStorage.setItem("memo", memo);
            document.querySelector("#area1").textContent = "저장완료" + memo;
        }

        function loadMemo() {
